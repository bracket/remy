version: '3'
services:
  remy-vite:
    build:
      context: .
      dockerfile: Dockerfile
      target: remy-vite
      args:
        BUILD_MODE: restore
    entrypoint: /bin/sh -c
    command: |
      'sh -s <<EOF
        . /asdf/asdf.sh
        cd /app
        npm install
        npx -c "vite build"
      EOF'

  snapshot-builder:
    build:
      context: .
      dockerfile: Dockerfile
      target: remy-vite
      args:
        BUILD_MODE: compile
    volumes:
      - type: bind
        source: .
        target: /mnt/build
    entrypoint: /bin/sh -c
    command: |
      'sh -s <<EOF
        echo "Creating snapshot tarball..."
        # Create tarball with .asdf directory and .tool-versions if it exists
        if [ -f /root/.tool-versions ]; then
          tar -cvjf /mnt/build/root_asdf.tbz2 /root/.asdf /root/.tool-versions
        else
          tar -cvjf /mnt/build/root_asdf.tbz2 /root/.asdf
        fi
        echo "Snapshot created successfully at /mnt/build/root_asdf.tbz2"
        exit 0
      EOF'
